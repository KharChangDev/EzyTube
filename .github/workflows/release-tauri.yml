name: Build Desktop Apps

on:
  workflow_dispatch:
  push:
    tags:
    - "v*"

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
        - platform: macos-latest
          artifact_suffix: macos-arm64
          args: --target aarch64-apple-darwin --bundles app
        - platform: macos-latest
          artifact_suffix: macos-x64
          args: --target x86_64-apple-darwin --bundles app
        - platform: ubuntu-22.04
          artifact_suffix: linux-x64
          args: --bundles deb,appimage
        - platform: windows-latest
          artifact_suffix: windows-x64
          args: ""

    runs-on: ${{ matrix.platform }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Linux base tools
      if: matrix.platform == 'ubuntu-22.04'
      env:
        DEBIAN_FRONTEND: noninteractive
        TZ: UTC
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          ca-certificates \
          curl \
          wget \
          file \
          git \
          build-essential \
          pkg-config \
          python3

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm

    - name: Cache Rust
      uses: swatinem/rust-cache@v2
      if: matrix.platform != 'windows-latest'
      with:
        workspaces: src-tauri

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

    - name: Install Linux system packages
      if: matrix.platform == 'ubuntu-22.04'
      env:
        DEBIAN_FRONTEND: noninteractive
        TZ: UTC
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgtk-3-dev \
          libwebkit2gtk-4.1-dev \
          libayatana-appindicator3-dev \
          libxdo-dev \
          libssl-dev \
          librsvg2-dev \
          patchelf \
          libfuse2 \
          libharfbuzz0b \
          libxcb-icccm4

    - name: Install frontend dependencies
      run: npm ci

    - name: Build Tauri bundles
      id: build-tauri
      uses: tauri-apps/tauri-action@v0.6.2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tagName: v__VERSION__
        releaseName: CNS Desktop v__VERSION__
        releaseBody: |
          Desktop bundles for Windows, macOS, and Linux.
          Linux users can choose AppImage for most distributions, .deb for Debian/Ubuntu-based systems, or the tar.gz archive for a raw binary package.
        releaseDraft: true
        prerelease: false
        assetNamePattern: "[name]_[version]_[platform]_[arch][ext]"
        retryAttempts: 2
        args: ${{ matrix.args }}

    - name: Create Linux tarball
      if: matrix.platform == 'ubuntu-22.04'
      shell: bash
      run: |
        set -euo pipefail
        tar_dir="src-tauri/target/release/bundle/tar"
        appimage="$(find src-tauri/target/release/bundle/appimage -maxdepth 1 -name '*.AppImage' | head -n 1)"
        appimage_name="$(basename "$appimage")"
        mkdir -p "$tar_dir"
        tar -C "$(dirname "$appimage")" -czf "$tar_dir/${appimage_name}.tar.gz" "$appimage_name"

    - name: Upload Linux tarball workflow artifact
      if: matrix.platform == 'ubuntu-22.04'
      uses: actions/upload-artifact@v4
      with:
        name: cns-linux-x64-tar
        path: src-tauri/target/release/bundle/tar/*.tar.gz
        if-no-files-found: error

    - name: Upload Linux tarball release asset
      if: matrix.platform == 'ubuntu-22.04'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: bash
      run: |
        set -euo pipefail
        release_tag="$(node -p "'v' + require('./package.json').version")"
        gh release upload "$release_tag" src-tauri/target/release/bundle/tar/*.tar.gz --clobber

    - name: Upload workflow artifacts
      uses: actions/upload-artifact@v4
      with:
        name: cns-${{ matrix.artifact_suffix }}
        path: |
          src-tauri/target/**/release/bundle
          src-tauri/target/release/bundle/tar/*.tar.gz
        if-no-files-found: error
